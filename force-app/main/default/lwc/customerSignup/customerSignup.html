<template>
    <lightning-card title="Premium Cab Services">
        <div class="slds-p-around_medium">
            <p class="slds-align_absolute-center"><b>Sign up to book a cab</b></p>
        </div>
        <div class="slds-grid slds-grid_align-center">
            <lightning-button variant="brand" label="Sign up" onclick={handleSignUp}></lightning-button>
            <lightning-button variant="brand" label="Sign In" onclick={handleSubmit}></lightning-button>
        </div>

        <template if:true={showForm}>
       
        <lightning-record-edit-form object-api-name="Cab_Customer__c" onsuccess={handleSuccess}>

            <lightning-input-field field-name="Name"> </lightning-input-field>
            <lightning-input-field field-name="Customer_Email__c"> </lightning-input-field>
            <lightning-input-field field-name="Username__c"> </lightning-input-field>
            <lightning-input-field field-name="Password__c"> </lightning-input-field>

            <div class="slds-var-m-top_medium">
                <lightning-button variant="brand" class="slds-align_absolute-center" type="submit" label="Submit">
                </lightning-button>
            </div>

        </lightning-record-edit-form>
        </template>

    </lightning-card>
</template>
